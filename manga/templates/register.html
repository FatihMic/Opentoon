{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kayıt Ol - OpenToon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        (function() {
            const getStoredTheme = () => localStorage.getItem('theme');
            const getPreferredTheme = () => {
                const storedTheme = getStoredTheme();
                if (storedTheme) { return storedTheme; }
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            };
            const setTheme = theme => {
                if (theme === 'auto') {
                    document.documentElement.setAttribute('data-bs-theme', (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
                } else {
                    document.documentElement.setAttribute('data-bs-theme', theme);
                }
            };
            setTheme(getPreferredTheme());
        })();
    </script>

    <style>
        :root {
            --primary: #8a2be2; --primary-hover: #9d50e5; --accent: #ffae00; 
            --bg-body: #121212; --bg-nav: #181818; --bg-card: #1e1e1e; --bg-input: #252525; --bg-footer: #0e0e0e; 
            --text-main: #f0f0f0; --text-muted: #a0a0a0; --border: #2d2d2d;
            --brand-glow-1: #7248f9; --brand-glow-2: #00d2ff;
        }
        [data-bs-theme="light"] {
            --bg-body: #f0f2f5; --bg-nav: #ffffff; --bg-card: #ffffff; --bg-input: #e9ecef; --bg-footer: #e4e6eb;
            --text-main: #1a1a1a; --text-muted: #666; --border: #dee2e6;
            --brand-glow-1: #9d50e5; --brand-glow-2: #00a8cc;
        }

        body { 
            background: linear-gradient(-45deg, var(--bg-body), var(--bg-nav), var(--bg-body), var(--bg-input));
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: var(--text-main); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 40px 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        
        .auth-container { position: relative; width: 100%; max-width: 500px; }
        .auth-card { 
            background-color: color-mix(in srgb, var(--bg-card) 75%, transparent);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 24px; padding: 40px 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); position: relative; z-index: 10;
        }
        
        .auth-container::before { content: ''; position: absolute; top: -10px; left: -10px; width: 120px; height: 120px; background: var(--brand-glow-1); border-radius: 50%; filter: blur(50px); opacity: 0.35; z-index: 1; pointer-events: none; }
        .auth-container::after { content: ''; position: absolute; bottom: -10px; right: -10px; width: 150px; height: 150px; background: var(--brand-glow-2); border-radius: 50%; filter: blur(60px); opacity: 0.25; z-index: 1; pointer-events: none; }

        .form-control { 
            background-color: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main) !important; padding: 12px 18px; border-radius: 12px; font-size: 1rem; margin-bottom: 5px;
            transition: all 0.3s ease;
        }
        .form-control:focus { 
            background-color: var(--bg-card); border-color: var(--primary);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.15); transform: translateY(-2px);
        }
        
        .btn-primary-custom { 
            background: linear-gradient(135deg, var(--brand-glow-1) 0%, var(--brand-glow-2) 100%);
            border: none; padding: 15px; border-radius: 14px; font-weight: 800; font-size: 1.1rem;
            color: #fff; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.25); width: 100%; display: block; text-align: center; margin-top: 20px;
        }
        .btn-primary-custom:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0, 168, 204, 0.3); color: #fff;}
        
        label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-top: 15px; }
        
        .brand-link { color: var(--text-main); text-decoration: none; font-size: 2.2rem; font-weight: 800; font-family: 'Outfit', sans-serif; display: block; text-align: center; margin-bottom: 10px; letter-spacing: -1px; }
        .brand-link span { background: linear-gradient(135deg, var(--brand-glow-1), var(--brand-glow-2)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        
        .helptext { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px; line-height: 1.3; }
        .errorlist { color: #ff4757; font-size: 0.8rem; padding-left: 0; list-style: none; margin-bottom: 10px; font-weight: 600; }
        .errorlist li { background: rgba(255, 71, 87, 0.1); padding: 5px 10px; border-radius: 6px; border-left: 3px solid #ff4757; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="{% url 'home' %}" class="brand-link">
                
                OPEN<span>TOON</span>
            </a>
            <h4 class="fw-bold mb-2 text-center" style="font-family: 'Outfit', sans-serif; color: var(--text-main);">Aramıza Katıl!</h4>
            <p class="text-center small mb-4" style="color: var(--text-muted);">Binlerce çizgi roman serisi seni bekliyor.</p>
            
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn-primary-custom mb-4" type="submit">Kayıt Ol <i class="fa-solid fa-user-plus ms-2"></i></button>
                
                <div class="text-center" style="font-size: 0.9rem; color: var(--text-muted);">
                    Zaten bir hesabın var mı? <a href="{% url 'login' %}" style="color: var(--brand-glow-2); font-weight: 700; text-decoration: none; border-bottom: 1px solid rgba(0, 168, 204, 0.3); padding-bottom: 2px;">Giriş Yap</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.querySelectorAll('input').forEach(i => i.classList.add('form-control'));
    </script>
</body>
</html>
