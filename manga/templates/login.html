{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giriş Yap - OpenToon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        (function() {
            const getStoredTheme = () => localStorage.getItem('theme');
            const getPreferredTheme = () => {
                const storedTheme = getStoredTheme();
                if (storedTheme) { return storedTheme; }
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            };
            const setTheme = theme => {
                if (theme === 'auto') {
                    document.documentElement.setAttribute('data-bs-theme', (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
                } else {
                    document.documentElement.setAttribute('data-bs-theme', theme);
                }
            };
            setTheme(getPreferredTheme());
        })();
    </script>

    <style>
        :root {
            --primary: #8a2be2; --primary-hover: #9d50e5; --accent: #ffae00; 
            --bg-body: #121212; --bg-nav: #181818; --bg-card: #1e1e1e; --bg-input: #252525; --bg-footer: #0e0e0e; 
            --text-main: #f0f0f0; --text-muted: #a0a0a0; --border: #2d2d2d;
            --brand-glow-1: #7248f9; --brand-glow-2: #ff007f;
        }
        [data-bs-theme="light"] {
            --bg-body: #f0f2f5; --bg-nav: #ffffff; --bg-card: #ffffff; --bg-input: #e9ecef; --bg-footer: #e4e6eb;
            --text-main: #1a1a1a; --text-muted: #666; --border: #dee2e6;
            --brand-glow-1: #9d50e5; --brand-glow-2: #ff4d4d;
        }

        body { 
            background: linear-gradient(-45deg, var(--bg-body), var(--bg-nav), var(--bg-body), var(--bg-input));
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        
        .auth-container { position: relative; width: 100%; max-width: 450px; padding: 20px; }
        .auth-card { 
            background-color: color-mix(in srgb, var(--bg-card) 75%, transparent);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 24px; padding: 45px 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); position: relative; z-index: 10;
        }
        
        .auth-container::before { content: ''; position: absolute; top: -10px; left: -10px; width: 100px; height: 100px; background: var(--brand-glow-1); border-radius: 50%; filter: blur(45px); opacity: 0.35; z-index: 1; pointer-events: none; }
        .auth-container::after { content: ''; position: absolute; bottom: -10px; right: -10px; width: 120px; height: 120px; background: var(--brand-glow-2); border-radius: 50%; filter: blur(55px); opacity: 0.25; z-index: 1; pointer-events: none; }

        .form-control { 
            background-color: var(--bg-input); border: 1px solid var(--border);
            color: var(--text-main) !important; padding: 14px 18px; border-radius: 12px; font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus { 
            background-color: var(--bg-card); border-color: var(--primary);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.15); transform: translateY(-2px);
        }
        
        .btn-primary-custom { 
            background: linear-gradient(135deg, var(--brand-glow-1) 0%, var(--brand-glow-2) 100%);
            border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 1.1rem;
            color: #fff; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.25); width: 100%; display: block; text-align: center; margin-top: 15px;
        }
        .btn-primary-custom:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 0, 127, 0.3); color: #fff;}
        
        .form-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: block; }
        
        .brand-link { color: var(--text-main); text-decoration: none; font-size: 2.2rem; font-weight: 800; font-family: 'Outfit', sans-serif; display: block; text-align: center; margin-bottom: 25px; letter-spacing: -1px; }
        .brand-link span { background: linear-gradient(135deg, var(--brand-glow-1), var(--brand-glow-2)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        
        .alert-danger { background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3); color: #ff4757; border-radius: 12px; font-weight: 600; text-align: center; padding: 12px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="{% url 'home' %}" class="brand-link">
                
                OPEN<span>TOON</span>
            </a>
            <h4 class="fw-bold mb-4 text-center font-outfit" style="font-family: 'Outfit', sans-serif; color: var(--text-main);">Tekrar Hoş Geldin!</h4>
            
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                    <div class="alert alert-danger mb-4"><i class="fa-solid fa-triangle-exclamation me-2"></i> Kullanıcı adı veya şifre hatalı.</div>
                {% endif %}
                
                <div class="mb-4">
                    <label class="form-label text-start w-100">Kullanıcı Adı</label>
                    {{ form.username }}
                </div>
                
                <div class="mb-4 position-relative">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label m-0">Şifre</label>
                        <a href="{% url 'password_reset' %}" class="text-decoration-none" style="color: var(--primary); font-weight: 600; font-size: 0.8rem;">Unuttun mu?</a>
                    </div>
                    {{ form.password }}
                </div>
                
                <button class="btn-primary-custom mb-4" type="submit">Giriş Yap <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i></button>
                
                <div class="text-center text-muted" style="font-size: 0.9rem;">
                    Henüz hesabın yok mu? <a href="{% url 'register' %}" style="color: var(--brand-glow-2); font-weight: 700; text-decoration: none; border-bottom: 1px solid rgba(255,0,127,0.3); padding-bottom: 2px;">Hemen Kayıt Ol</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('input').forEach(i => {
            i.classList.add('form-control');
            i.setAttribute('placeholder', '••••••••');
        });
        const un = document.querySelector('input[name="username"]');
        if(un) { un.setAttribute('placeholder', 'Kullanıcı Adın'); }
    </script>
</body>
</html>
