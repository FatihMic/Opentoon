{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hesap İşlemi - OpenToon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #050505; color: #fff; padding: 50px; font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body>
    <div class="container text-center mt-5">
        <a href="/" style="color: #7248f9; text-decoration:none; font-size: 2rem; font-weight: 800;">OpenToon</a>
        <div class="card bg-dark text-white p-4 mx-auto mt-4" style="max-width: 500px; border: 1px solid rgba(255,255,255,0.1);">
            <h4 class="mb-3">İşlem</h4>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary w-100" style="background:#7248f9; border:none;">Onayla / Gönder</button>
            </form>
            <a href="{% url 'login' %}" class="d-block mt-3" style="color: #aaa;">Giriş Sayfasına Dön</a>
        </div>
    </div>
</body>
</html>
